name: foundation-gate

# Inherits the wave-foundation cross-org gate (secret-scan + file-size + SKILL.md frontmatter).
# Required status check on the default branch (added once this lands).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  foundation-gate:
    uses: wave-av/wave-foundation/.github/workflows/checks.yml@v1
    with:
      max_lines: 800
